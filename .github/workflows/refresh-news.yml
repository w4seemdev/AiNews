name: "Refresh AI news"

# Runs the daily news pipeline:
#   ① collector (scripts/refresh-news.mjs) → fetch RSS, map to cards
#   ② optional LLM enrichment (scripts/enrich.mjs) — only if ANTHROPIC_API_KEY secret is set
#   ③ publisher → writes public/releases.json
# then commits the regenerated public/releases.json if (and only if) it changed.

on:
  # Daily at 06:00 UTC.
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Default: no permissions for any job unless it opts in below.
permissions: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    # contents:write is scoped to THIS job only, so the commit step can push
    # back to the repo; any future jobs default to no access.
    permissions:
      contents: write
    steps:
      - name: Checkout
        # Pinned to an immutable commit SHA (tag-hijack protection).
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Node
        # Pinned to an immutable commit SHA (tag-hijack protection).
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install dependencies
        # `npm ci` installs the exact versions pinned in package-lock.json;
        # `--ignore-scripts` blocks dependency install scripts from executing
        # in a job that holds contents:write and ANTHROPIC_API_KEY
        # (rss-parser and the rest of this toolchain need no install scripts).
        run: npm ci --ignore-scripts

      - name: Refresh news feed
        run: npm run refresh
        env:
          # Optional. If unset, scripts/enrich.mjs skips the LLM step gracefully.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated feed
        run: |
          # Neutral bot identity — no AI/Claude attribution.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Skip the commit entirely when public/releases.json is unchanged.
          if git diff --quiet -- public/releases.json; then
            echo "No changes to public/releases.json — nothing to commit."
            exit 0
          fi

          git add public/releases.json
          git commit -m "chore: refresh AI news feed"
          git push
