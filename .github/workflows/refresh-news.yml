name: "Refresh AI news"

# Runs the daily news pipeline:
#   ① collector (scripts/refresh-news.mjs) → fetch RSS, map to cards
#   ② optional LLM enrichment (scripts/enrich.mjs) — only if ANTHROPIC_API_KEY secret is set
#   ③ publisher → writes public/releases.json + public/meta.json + public/feed.xml
# then commits the regenerated files if (and only if) they changed.
#
# NOTE: `schedule` triggers only run against the repository's DEFAULT branch
# (main), and only when GitHub Actions is enabled for the repo. GitHub also
# disables scheduled workflows after ~60 days without repo activity — check
# the Actions tab and re-enable if the "Refresh AI news" workflow shows as
# disabled.

on:
  # Daily at 06:00 UTC.
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Default: no permissions for any job unless it opts in below.
permissions: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    # contents:write is scoped to THIS job only, so the commit step can push
    # back to the repo; any future jobs default to no access.
    permissions:
      contents: write
    steps:
      - name: Checkout
        # Pinned to an immutable commit SHA (tag-hijack protection).
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Node
        # Pinned to an immutable commit SHA (tag-hijack protection).
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install dependencies
        # `npm ci` installs the exact versions pinned in package-lock.json;
        # `--ignore-scripts` blocks dependency install scripts from executing
        # in a job that holds contents:write and ANTHROPIC_API_KEY
        # (rss-parser and the rest of this toolchain need no install scripts).
        run: npm ci --ignore-scripts

      - name: Refresh news feed
        run: npm run refresh
        env:
          # Optional. If unset, scripts/enrich.mjs skips the LLM step gracefully.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify lab coverage
        # The collector skips broken feeds silently by design (one bad feed
        # must not kill the run) — this gate makes systemic source failure
        # LOUD instead: fail the job when fewer than 4 labs produced items.
        run: |
          node --input-type=module -e '
            import { readFile } from "node:fs/promises"
            const meta = JSON.parse(await readFile("public/meta.json", "utf8"))
            const withItems = Object.entries(meta.labs).filter(([, n]) => n > 0)
            console.log("Labs with items:", withItems.map(([lab, n]) => `${lab}(${n})`).join(", "))
            if (withItems.length < 4) {
              console.error(`::error::Only ${withItems.length} labs produced items (need >= 4). Feed sources are likely broken — check scripts/refresh-news.mjs SOURCES.`)
              process.exit(1)
            }
          '

      - name: Commit updated feed
        run: |
          # Neutral bot identity — no AI/Claude attribution.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Skip the commit entirely when the pipeline outputs are unchanged.
          # (meta.json's generatedAt changes every run, so in practice this
          # commits daily — which also keeps the scheduled workflow active.)
          if git diff --quiet -- public/releases.json public/meta.json public/feed.xml; then
            echo "No changes to pipeline outputs — nothing to commit."
            exit 0
          fi

          git add public/releases.json public/meta.json public/feed.xml
          git commit -m "chore: refresh AI news feed"
          git push
