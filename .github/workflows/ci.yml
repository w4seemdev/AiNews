name: "CI"

# Quality gate for every push and pull request: install pinned dependencies,
# typecheck (the plain `vite build` strips types without checking them), and
# make sure the production build still succeeds.

on:
  push:
    branches: [main]
  pull_request:

# Default: no permissions for any job unless it opts in below.
permissions: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # Pinned to an immutable commit SHA (tag-hijack protection).
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Set up Node
        # Pinned to an immutable commit SHA (tag-hijack protection).
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install dependencies
        # `npm ci` installs the exact versions pinned in package-lock.json;
        # `--ignore-scripts` blocks dependency install scripts from executing.
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
